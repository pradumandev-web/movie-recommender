version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: movie-recommender:latest
    container_name: movie-recommender-app
    ports:
      - "8501:8501"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    volumes:
      - app-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  app-logs: